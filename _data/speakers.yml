- name: 楊富鈞
  affiliation: 國立臺灣博物館 助理研究員
  biography: 一名打心底認同資料管理與開放價值的實務工作者。曾任職於臺灣生物多樣性資訊機構 (TaiBIF)，熟悉生物多樣性資料標準；現為國立臺灣博物館社畜，負責統合館內生物領域全類群典藏資料的管理與開放。因長期在第一線「弄髒手」處理原始資料，深知其中甘苦，同時磨練出對資料管理的獨到想法與堅持。近期醉心於探討如何讓常態性的典藏管理，轉化為推進國家層級物種名錄演化的關鍵養分。
  img: fcyang.jpg
