- name: 呂佳陵
  affiliation: 國立東華大學自然資源學系 研究助理
  biography: 講者目前負責 LTSER 花蓮站之資料管理相關工作，協助整理與維護長期研究計畫中所產生的各類資料，包含自然生態監測資料與社會科學問卷調查資料。工作內容涵蓋資料結構整理、資料流程盤點、網站平台建置，以及資料備份與長期保存方式之規劃，並實際參與跨研究團隊之資料協調與溝通。在花蓮站的資料管理實務中，需同時面對不同資料型態、研究尺度與管理習慣所帶來的挑戰，例如高度結構化的生態監測資料，以及涉及隱私與使用限制的社會科學調查資料。目前正逐步盤點計畫內各子計畫的資料管理現況，嘗試在不影響研究進行的前提下，建立可長期維護的基本管理原則。本次分享將介紹花蓮站目前資料管理的實際作法與初步規劃方向，並透過工作坊交流，討論不同站點在多元資料管理上的經驗與可能做法。
  img: a.jpg
