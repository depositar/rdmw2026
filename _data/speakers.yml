- name: 袁美華
  affiliation: 中央研究院環境變遷研究中心 助研究員
  biography: 國立臺灣大學環境工程博士。曾任職於非政府組織與台北市政府環境保護局，具政策與實務經驗，後投入學術研究，專注於環境價值的估算並應用於永續治理。她的研究場域包括濕地防災功能、珊瑚礁的生態價值、竹林碳匯與生態系服務，並積極推動利害關係人共創的生活實驗室方法，期望發展兼具科學基礎與在地知識的永續解方。 
  img: meihuayuan_v1.png
- name: 張筑竣
  affiliation: TaiBIF 臺灣生物多樣性資訊機構 研發工程師
  biography: 目前擔任臺灣生物多樣性資訊機構之研發工程師，從事生物多樣性資料服務與資訊系統建置。專注於提供穩定且高可用性的網站服務，並具備整合型桌面應用程式開發、流程自動化以及 AI 應用導入等實務經驗。具備生物資訊背景，擅長將調查與研究產出的資料轉換為合適的資料結構與標準，並以工程與 AI 技術提升生物多樣性資料服務的可用性與長期維運品質。
  img: jhujyunjhang.JPG
- name: 許正欣
  affiliation: 中央研究院數位文化中心 專案經理
  biography: 現任中央研究院數位文化中心專案經理。於中央研究院服務歷經物理所網格計算團隊、生物多樣性研究中心資訊專題中心到數位文化中心，長期投入「臺灣生命大百科」與生物多樣性資料庫之維運。近年將資料管理經驗導入數位人文學範疇，負責『開放博物館』與『Open Academy』之核心系統建置與架構設計，致力以資訊技術解決跨領域資料建置挑戰，推動開放資料與數位轉譯。
  img: jimshsu.JPG
