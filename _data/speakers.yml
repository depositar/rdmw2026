- name: 李梅君
  affiliation: 中研院民族學研究所 助研究員
  biography: 游走在數位、資料、賽伯格間的後/人類學家與數位民族誌工作者。g0v零時政府的參與者與研究者。美國加州大學戴維斯分校人類學博士，現任中央研究院民族學研究所助研究員。研究關注科技和民主動態的辯證關係，包含數位行動主義、開放政府、資料政治、錯假訊息與後人類戰爭。
