  biography: 黃倬英是台灣大學地理環境資源學系教授兼系主任，研究專長為跨尺度光學遙測在臺灣山地雲霧帶的森林與農業生態系統的研究，主要的研究地區是棲蘭山以及大阿里山茶區。
