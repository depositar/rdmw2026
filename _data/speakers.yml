  biography: 在長期社會生態核心觀測之西南海岸站擔任博士後研究員，以探討生態系統營養動態影響因子的主題為研究方向，曾比較龜山島淺海熱泉與鄰近珊瑚礁的生態系營養階層之差異，現在的工作以觀測七股潟湖生態服務功能長期之變化趨勢為主。
