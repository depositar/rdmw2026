- name: 林薇
  affiliation: 國立臺灣大學地理學系黃誌川教授 研究計畫專員
  biography: 現任台大地理系研究計畫專員，負責長期社會生態核心觀測平台(LTSER)翡翠站維運，執行水樣採集與分析、溪流監測數據管理、自然與社會生態資料整合，以及網站公開資料維護等，致力提升長期觀測數據於跨領域協作中的流通性與治理量能。
